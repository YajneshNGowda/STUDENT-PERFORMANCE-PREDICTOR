<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EduGuard — Student Risk Intelligence</title>
    <meta name="description" content="EduGuard: AI-powered early warning system for student academic risk detection." />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800;0,14..32,900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

    <!-- Favicon SVG -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stop-color='%234f46e5'/><stop offset='1' stop-color='%23a855f7'/></linearGradient></defs><rect width='100' height='100' rx='22' fill='url(%23g)'/><text y='72' x='50' text-anchor='middle' font-size='58' font-family='sans-serif' fill='white'>🛡</text></svg>" />

    <!-- Theme: prevent flash of wrong theme -->
    <script>
      (function(){
        const t = localStorage.getItem('eg_theme');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (t === 'dark' || (!t && prefersDark)) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>

    <!-- Base styles applied before React mounts -->
    <style>
      :root { font-synthesis: none; text-rendering: optimizeLegibility; -webkit-font-smoothing: antialiased; }
      body { margin: 0; font-family: 'Inter', system-ui, sans-serif; }
      #root { min-height: 100vh; }

      /* Loader shown before React hydrates */
      .pre-loader {
        position: fixed; inset: 0;
        display: flex; align-items: center; justify-content: center;
        background: #f4f6fb;
        z-index: 9999;
        transition: opacity 0.3s ease;
      }
      .dark .pre-loader { background: #0a0f1e; }
      .pre-loader-inner {
        display: flex; flex-direction: column; align-items: center; gap: 16px;
      }
      .pre-loader-logo {
        width: 52px; height: 52px;
        background: linear-gradient(135deg, #4f46e5, #a855f7);
        border-radius: 14px;
        display: flex; align-items: center; justify-content: center;
        font-size: 26px;
        box-shadow: 0 8px 24px rgba(99,102,241,0.4);
        animation: pulse-logo 1.6s ease-in-out infinite;
      }
      .pre-loader-text {
        font-size: 13px; font-weight: 600;
        color: #94a3b8; letter-spacing: 0.05em;
      }
      @keyframes pulse-logo {
        0%,100% { transform: scale(1);   box-shadow: 0 8px 24px rgba(99,102,241,0.4); }
        50%      { transform: scale(1.06); box-shadow: 0 12px 32px rgba(99,102,241,0.6); }
      }
    </style>
  </head>
  <body>
    <!-- Pre-loader (hidden once React mounts) -->
    <div class="pre-loader" id="pre-loader">
      <div class="pre-loader-inner">
        <div class="pre-loader-logo">🛡</div>
        <div class="pre-loader-text">EduGuard · Loading…</div>
      </div>
    </div>

    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>

    <!-- Hide pre-loader once React is ready -->
    <script>
      window.addEventListener('DOMContentLoaded', function() {
        setTimeout(function() {
          const el = document.getElementById('pre-loader');
          if (el) { el.style.opacity = '0'; setTimeout(()=> el.remove(), 300); }
        }, 200);
      });
    </script>
  </body>
</html>
